name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: CLI smoke test (empty dirs)
        run: |
          node dist/cli.js --claude-dir /tmp/nope --codex-dir /tmp/nope
          node dist/cli.js doctor --claude-dir /tmp/nope --codex-dir /tmp/nope
          # --fail-on-warn passes when there's nothing to warn about…
          node dist/cli.js doctor --fail-on-warn --claude-dir /tmp/nope --codex-dir /tmp/nope
          # …and is rejected outside doctor (loud-validation rule)
          ! node dist/cli.js --fail-on-warn
      - name: CLI rejects bad input loudly (never silently $0)
        run: |
          ! node dist/cli.js --month 2026-13
          ! node dist/cli.js --month 13-2026
          ! node dist/cli.js --days 0
          ! node dist/cli.js --days banana
          ! node dist/cli.js --budget -5
          ! node dist/cli.js doctr
          ! node dist/cli.js --jsonn
          ! node dist/cli.js sessions nosuchid --claude-dir /tmp/nope --codex-dir /tmp/nope
          ! node dist/cli.js --project
          ! node dist/cli.js --branch --json
          ! node dist/cli.js --agent gemini
