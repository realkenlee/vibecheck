name: release

# Tag v* → build single-file executables for every platform and attach them
# to a GitHub Release. This is the no-Node distribution path: one static
# artifact per platform, checksummed — what locked-down enterprise laptops
# and artifact proxies want.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Compile single-file executables
        run: |
          mkdir -p release
          for target in bun-darwin-arm64 bun-darwin-x64 bun-linux-x64 bun-linux-arm64 bun-windows-x64; do
            suffix="${target#bun-}"
            out="release/vibecheck-${suffix}"
            [ "$suffix" = "windows-x64" ] && out="${out}.exe"
            bun build --compile --minify --target="$target" dist/cli.js --outfile "$out"
          done
          ls -lh release/

      - name: Smoke-test the linux binary
        run: ./release/vibecheck-linux-x64 --claude-dir /tmp/nope --codex-dir /tmp/nope

      - name: Checksums
        run: cd release && shasum -a 256 * > SHA256SUMS

      # The release page shows the CHANGELOG section for this version — the
      # notes are written once, in CHANGELOG.md, and surfaced where users land.
      # A tag without a CHANGELOG section fails loudly: notes are part of the release.
      - name: Extract CHANGELOG section
        run: |
          awk -v ver="${GITHUB_REF_NAME#v}" \
            '$0 ~ "^## \\[" ver "\\]" {f=1; next} /^## \[/ {f=0} f' CHANGELOG.md > notes.md
          if ! grep -q '[^[:space:]]' notes.md; then
            echo "CHANGELOG.md has no section for ${GITHUB_REF_NAME#v} — write the notes before tagging" >&2
            exit 1
          fi
          printf '\nSingle-file executables — no Node/npm required. Verify with SHA256SUMS. Or just: `npx vibe-check`\n' >> notes.md
          cat notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release/* \
            --title "vibecheck ${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes-file notes.md

  # The .exe is cross-compiled on linux and would otherwise ship without ever
  # having been executed on Windows. Run the released artifact where users will.
  smoke-windows:
    needs: release
    runs-on: windows-latest
    steps:
      - name: Smoke-test the windows binary
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$GITHUB_REF_NAME" -R "$GITHUB_REPOSITORY" -p vibecheck-windows-x64.exe
          ./vibecheck-windows-x64.exe --version
          ./vibecheck-windows-x64.exe --claude-dir ./nope --codex-dir ./nope
          ! ./vibecheck-windows-x64.exe --agent gemini
